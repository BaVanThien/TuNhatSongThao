<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Mừng 8-3</title>

<style>

body{
background:black;
color:#0f0;
font-family:monospace;
text-align:center;
overflow:hidden;
}

/* chữ hacker */

#text{
margin-top:120px;
font-size:28px;
color:#ff69b4;
}

/* hoa rơi */

.flower{
position:absolute;
top:-50px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(100vh)}
}

/* trái tim bay */

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
color:red;
animation:fly 5s linear infinite;
}

@keyframes fly{
0%{transform:translateY(0)}
100%{transform:translateY(-100vh)}
}

/* hoa hồng */

.rose{
margin-top:40px;
color:red;
font-size:18px;
white-space:pre;
animation:bloom 4s forwards;
}

@keyframes bloom{
0%{transform:scale(0.2);opacity:0}
100%{transform:scale(1);opacity:1}
}

</style>
</head>

<body>

<h1>🌸 Happy Women's Day 8-3 🌸</h1>

<div id="text"></div>

<div class="rose">

        _ _
     {` ` `}\
    {  `   ` }
   { `  ` `  }
    {  `   ` }
     {` ` `}/
       \|/
        |
       \|/
        |
       \|/
        |
       / \

</div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* chữ gõ từng ký tự */

let message="Chúc bạn một ngày 8-3 thật hạnh phúc, luôn xinh đẹp và rạng rỡ 🌹";

let i=0;

function typing(){

if(i<message.length){

document.getElementById("text").innerHTML+=message.charAt(i);

i++;

setTimeout(typing,70);

}

}

typing();


/* hoa rơi */

function flower(){

let f=document.createElement("div");

f.innerHTML="🌸";

f.className="flower";

f.style.left=Math.random()*100+"vw";

f.style.animationDuration=3+Math.random()*5+"s";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},8000);

}

setInterval(flower,300);


/* trái tim bay */

function heart(){

let h=document.createElement("div");

h.innerHTML="❤";

h.className="heart";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>{h.remove()},5000);

}

setInterval(heart,500);

</script>

</body>
</html>
