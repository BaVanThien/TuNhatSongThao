<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc mừng 8-3</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

/* text */
#text{
position:absolute;
top:20%;
width:100%;
text-align:center;
color:#ff99cc;
font-size:32px;
font-weight:bold;
text-shadow:0 0 20px pink;
}

/* heart canvas */
#heart{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div id="text"></div>

<canvas id="heart"></canvas>

<script>

/* typing text */

let name="Người Phụ Nữ Tuyệt Vời 💖"
let msg="Chúc Mừng 8-3 "
let i=0

function type(){
if(i < msg.length){
document.getElementById("text").innerHTML += msg.charAt(i)
i++
setTimeout(type,120)
}else{
document.getElementById("text").innerHTML += name
}
}
type()

/* THREE JS ROSE */

let scene=new THREE.Scene()
let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)

let renderer=new THREE.WebGLRenderer({alpha:true})
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

camera.position.z=5

let petals=[]

for(let i=0;i<20;i++){

let geo=new THREE.SphereGeometry(0.3,32,32)
let mat=new THREE.MeshBasicMaterial({color:0xff0040})

let petal=new THREE.Mesh(geo,mat)

petal.position.x=Math.sin(i)*1.2
petal.position.y=Math.cos(i)*1.2

scene.add(petal)

petals.push(petal)

}

/* HEART PARTICLES */

let canvas=document.getElementById("heart")
let ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<1000;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
})

}

function drawHeart(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

let t=Date.now()/1000

p.x += Math.sin(t+p.y)*0.3
p.y += Math.cos(t+p.x)*0.3

ctx.fillStyle="rgba(255,100,150,0.8)"
ctx.fillRect(p.x,p.y,p.size,p.size)

})

requestAnimationFrame(drawHeart)

}

drawHeart()

/* FIREWORKS */

let fireworks=[]

function createFirework(){

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight/2

for(let i=0;i<80;i++){

fireworks.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100
})

}

}

setInterval(createFirework,1200)

function drawFireworks(){

ctx.fillStyle="rgba(0,0,0,0.1)"
ctx.fillRect(0,0,canvas.width,canvas.height)

fireworks.forEach((f,i)=>{

f.x+=f.vx
f.y+=f.vy
f.life--

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`
ctx.fillRect(f.x,f.y,3,3)

if(f.life<=0)fireworks.splice(i,1)

})

requestAnimationFrame(drawFireworks)

}

drawFireworks()

/* ANIMATE 3D */

function animate(){

requestAnimationFrame(animate)

petals.forEach((p,i)=>{
p.rotation.z +=0.01
p.scale.x = 1 + Math.sin(Date.now()*0.002+i)*0.2
p.scale.y = p.scale.x
})

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
