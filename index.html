<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thao8-3 ❤️</title>

<style>

body{
    background:black;
    color:white;
    text-align:center;
    font-family: Arial;
    margin-top:120px;
}

h1{
    color:#ff4d6d;
    font-size:50px;
}

.heart{
    font-size:120px;
    animation: beat 1s infinite;
}

@keyframes beat{
    0%{transform:scale(1);}
    50%{transform:scale(1.2);}
    100%{transform:scale(1);}
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    background:#ff4d6d;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

#msg{
    margin-top:30px;
    font-size:28px;
    display:none;
}

</style>

</head>

<body>

<h1>Chúc Thảo 8-3 ❤️</h1>

<div class="heart">❤️</div>

<br>

<button onclick="show()">Bấm vào đây</button>

<div id="msg">
    <p>Chúc Thảo luôn xinh đẹp 🌸</p>
    <p>Luôn vui vẻ và hạnh phúc</p>
    <p>Và đặc biệt là...</p>
    <h2>❤️</h2>
</div>

<script>

function show(){
    document.getElementById("msg").style.display="block"
}

</script>

</body>
</html>
