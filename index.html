<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Chúc Thảo 8-3 ❤️</title>

<style>

body{
background:black;
color:white;
text-align:center;
font-family:Courier New;
margin:0;
overflow:hidden;
}

/* màn hình terminal */

#terminal{
padding-top:120px;
font-size:18px;
}

button{
padding:15px 30px;
font-size:18px;
background:#ff4d6d;
border:none;
color:white;
border-radius:10px;
cursor:pointer;
}

/* trang lời chúc */

#lovePage{
display:none;
font-family:Arial;
padding-top:100px;
}

h1{
color:#ff4d6d;
font-size:40px;
}

.heart{
font-size:120px;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* hoa rơi */

.flower{
position:fixed;
top:-10px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
to{transform:translateY(110vh)}
}

/* pháo hoa */

canvas{
position:fixed;
top:0;
left:0;
display:none;
}

</style>
</head>

<body>

<!-- TERMINAL -->

<div id="terminal">

<div id="code"></div>

<br><br>

<button onclick="runCode()">Bấm vào đây</button>

</div>


<!-- TRANG LỜI CHÚC -->

<div id="lovePage">

<h1>Chúc Thảo 8-3 ❤️</h1>

<div class="heart">❤️</div>

<p>Chúc Thảo luôn xinh đẹp 🌸</p>
<p>Luôn vui vẻ và hạnh phúc</p>
<p>Và đặc biệt là...</p>

<h2>❤️ Anh yêu em ❤️</h2>

</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<canvas id="fireworks"></canvas>

<script>

/* giả lập code C */

const lines=[
"guest@love:~$ cat love.c",
"",
"#include <stdio.h>",
"",
"int main(){",
'   printf("Anh yêu em Thảo ❤️");',
"}",
"",
"guest@love:~$ gcc love.c",
"guest@love:~$ ./love",
"",
"Anh yêu em Thảo ❤️"
]

let i=0

function runCode(){

document.querySelector("button").style.display="none"

let code=document.getElementById("code")

let interval=setInterval(()=>{

code.innerHTML+=lines[i]+"<br>"

i++

if(i>=lines.length){

clearInterval(interval)

setTimeout(showLove,2000)

}

},500)

}

/* chuyển sang lời chúc */

function showLove(){

document.getElementById("terminal").style.display="none"

document.getElementById("lovePage").style.display="block"

document.getElementById("music").play()

startFlowers()

startFireworks()

}

/* hoa rơi */

function startFlowers(){

setInterval(()=>{

let flower=document.createElement("div")

flower.className="flower"

flower.innerHTML="🌸"

flower.style.left=Math.random()*100+"vw"

flower.style.animationDuration=(Math.random()*3+3)+"s"

document.body.appendChild(flower)

setTimeout(()=>flower.remove(),6000)

},300)

}

/* pháo hoa */

function startFireworks(){

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.style.display="block"

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function createFirework(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<40;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100
})

}

}

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,index)=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.fillStyle="red"
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0) particles.splice(index,1)

})

requestAnimationFrame(animate)

}

setInterval(createFirework,1000)

animate()

}

</script>

</body>
</html>
