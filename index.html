<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:cursive;
color:white;
text-align:center;
}

/* tiêu đề */

#title{
position:absolute;
top:20px;
width:100%;
font-size:40px;
color:#ff69b4;
}

/* chữ viết tay */

#message{
position:absolute;
top:100px;
width:100%;
font-size:28px;
color:#ff99cc;
}

/* canvas */

#scene{
position:absolute;
top:0;
left:0;
}

/* sao */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

/* trái tim bay */

.heart{
position:absolute;
color:red;
font-size:18px;
animation:fly 6s linear infinite;
}

@keyframes fly{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-100vh);
opacity:0;
}

}

/* chữ ghép bằng tim */

.nameHeart{
position:absolute;
color:red;
font-size:14px;
}

</style>
</head>

<body>

<div id="title">🌸 Happy Women's Day 8-3 🌸</div>
<div id="message"></div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* chữ viết tay */

let text="Chúc bạn một ngày 8-3 thật hạnh phúc, luôn xinh đẹp và rạng rỡ 🌹";

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,60);

}

}

typing();


/* bầu trời sao */

for(let i=0;i<200;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

document.body.appendChild(s);

}


/* trái tim bay */

function heart(){

let h=document.createElement("div");

h.innerHTML="❤";

h.className="heart";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

setInterval(heart,300);


/* trái tim ghép tên */

let name="LAN";

let startX=window.innerWidth/2-100;
let startY=200;

for(let y=0;y<name.length;y++){

for(let x=0;x<10;x++){

let h=document.createElement("div");

h.innerHTML="❤";

h.className="nameHeart";

h.style.left=startX+x*20+"px";
h.style.top=startY+y*40+"px";

document.body.appendChild(h);

}

}


/* THREE JS hoa hồng 3D */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer = new THREE.WebGLRenderer({alpha:true});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

const geometry = new THREE.SphereGeometry(2,32,32);

const material = new THREE.MeshBasicMaterial({
color:0xff0033,
wireframe:true
});

const rose = new THREE.Mesh(geometry,material);

scene.add(rose);

camera.position.z=6;

function animate(){

requestAnimationFrame(animate);

rose.rotation.x+=0.01;
rose.rotation.y+=0.01;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
