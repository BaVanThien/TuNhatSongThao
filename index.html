<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<style>

body{
background:black;
color:white;
text-align:center;
overflow:hidden;
font-family:monospace;
}

h1{
color:#00ff88;
margin-top:40px;
}

/* container */

.rose-container{
position:absolute;
left:50%;
top:60%;
transform:translate(-50%,-50%);
}

/* cánh hoa */

.petal{
position:absolute;
width:80px;
height:80px;
background:red;
border-radius:50%;
transform-origin:bottom center;
opacity:0;
animation:bloom 3s forwards;
}

/* vị trí từng cánh */

.p1{ transform:rotate(0deg) translateY(-20px);}
.p2{ transform:rotate(60deg) translateY(-20px);}
.p3{ transform:rotate(120deg) translateY(-20px);}
.p4{ transform:rotate(180deg) translateY(-20px);}
.p5{ transform:rotate(240deg) translateY(-20px);}
.p6{ transform:rotate(300deg) translateY(-20px);}

@keyframes bloom{

0%{
opacity:0;
transform:scale(0);
}

100%{
opacity:1;
transform:scale(1);
}

}

/* thân hoa */

.stem{
position:absolute;
width:6px;
height:200px;
background:green;
left:37px;
top:60px;
}

/* lá */

.leaf{
position:absolute;
width:60px;
height:30px;
background:green;
border-radius:50%;
}

.l1{
left:-50px;
top:120px;
transform:rotate(-30deg);
}

.l2{
left:40px;
top:150px;
transform:rotate(30deg);
}

/* hoa rơi */

.flower{
position:absolute;
top:-50px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px)}
100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<h1>🌸 Happy Women's Day 8-3 🌸</h1>

<h2>Chúc bạn luôn xinh đẹp và hạnh phúc 🌹</h2>

<div class="rose-container">

<div class="petal p1"></div>
<div class="petal p2"></div>
<div class="petal p3"></div>
<div class="petal p4"></div>
<div class="petal p5"></div>
<div class="petal p6"></div>

<div class="stem"></div>

<div class="leaf l1"></div>
<div class="leaf l2"></div>

</div>

<script>

/* hoa rơi */

function flower(){

let f=document.createElement("div");

f.innerHTML="🌸";

f.className="flower";

f.style.left=Math.random()*100+"vw";

f.style.animationDuration=3+Math.random()*5+"s";

document.body.appendChild(f);

setTimeout(()=>{f.remove()},8000);

}

setInterval(flower,300);

</script>

</body>
</html>
