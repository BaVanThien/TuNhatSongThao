<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Happy Women's Day</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:'Segoe UI', cursive;
color:white;
text-align:center;

/* GALAXY BACKGROUND */

background:
radial-gradient(circle at 20% 30%, rgba(120,0,255,0.4), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,150,255,0.3), transparent 40%),
radial-gradient(circle at 50% 50%, rgba(255,0,150,0.2), transparent 50%),
black;
}

#title{
position:absolute;
top:30px;
width:100%;
font-size:42px;
color:#ff77cc;
}

#message{
position:absolute;
top:110px;
width:100%;
font-size:26px;
color:#ff99cc;
}

/* sao */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.3}
to{opacity:1}
}

/* sao băng */

.shooting{
position:absolute;
width:3px;
height:3px;
background:white;
box-shadow:0 0 6px white;
animation:shoot 2s linear;
}

@keyframes shoot{

0%{
transform:translate(0,0);
opacity:1;
}

100%{
transform:translate(400px,200px);
opacity:0;
}

}

/* trái tim */

.heart{
position:absolute;
color:red;
font-size:20px;
animation:fly 6s linear infinite;
}

@keyframes fly{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-100vh);
opacity:0;
}

}

canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div id="title">🌸 Happy Women's Day 8-3 🌸</div>
<div id="message"></div>

<audio autoplay loop>
<source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>

/* TYPEWRITER MESSAGE */

let text="Chúc bạn một ngày 8-3 thật hạnh phúc, luôn xinh đẹp và rạng rỡ 🌹";

let i=0;

function typing(){

if(i<text.length){

document.getElementById("message").innerHTML+=text.charAt(i);

i++;

setTimeout(typing,60);

}

}

typing();

/* STARS */

for(let i=0;i<350;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";

let size=Math.random()*3;

s.style.width=size+"px";
s.style.height=size+"px";

document.body.appendChild(s);

}

/* SHOOTING STARS */

function shooting(){

let s=document.createElement("div");

s.className="shooting";

s.style.left=Math.random()*window.innerWidth+"px";
s.style.top=Math.random()*200+"px";

document.body.appendChild(s);

setTimeout(()=>s.remove(),2000);

}

setInterval(shooting,4000);

/* HEART FLOAT */

function heart(){

let h=document.createElement("div");

h.innerHTML="❤";

h.className="heart";

h.style.left=Math.random()*100+"vw";

document.body.appendChild(h);

setTimeout(()=>h.remove(),6000);

}

setInterval(heart,300);

/* THREE JS ROSE */

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

const renderer=new THREE.WebGLRenderer({alpha:true});

renderer.setSize(window.innerWidth,window.innerHeight);

document.body.appendChild(renderer.domElement);

camera.position.z=6;

/* LIGHT */

const light=new THREE.PointLight(0xffffff,1);

light.position.set(10,10,10);

scene.add(light);

/* LOAD ROSE MODEL */

const loader=new THREE.GLTFLoader();

loader.load(

'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Rose/glTF/Rose.gltf',

function(gltf){

const rose=gltf.scene;

rose.scale.set(2,2,2);

scene.add(rose);

function animate(){

requestAnimationFrame(animate);

rose.rotation.y+=0.01;

renderer.render(scene,camera);

}

animate();

}

);

</script>

</body>
</html>
