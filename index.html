<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chúc Mừng 8-3</title>

<style>

body{
margin:0;
background:black;
overflow:hidden;
font-family:sans-serif;
text-align:center;
color:white;
}

/* Galaxy */
.galaxy{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,#222,#000);
animation:spin 40s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* Rose */
.rose{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

.petal{
width:40px;
height:80px;
background:red;
border-radius:50%;
position:absolute;
opacity:0;
animation:bloom 4s forwards;
}

.petal:nth-child(1){transform:rotate(0deg) translateY(-40px);animation-delay:0s;}
.petal:nth-child(2){transform:rotate(45deg) translateY(-40px);animation-delay:0.5s;}
.petal:nth-child(3){transform:rotate(90deg) translateY(-40px);animation-delay:1s;}
.petal:nth-child(4){transform:rotate(135deg) translateY(-40px);animation-delay:1.5s;}
.petal:nth-child(5){transform:rotate(180deg) translateY(-40px);animation-delay:2s;}
.petal:nth-child(6){transform:rotate(225deg) translateY(-40px);animation-delay:2.5s;}
.petal:nth-child(7){transform:rotate(270deg) translateY(-40px);animation-delay:3s;}
.petal:nth-child(8){transform:rotate(315deg) translateY(-40px);animation-delay:3.5s;}

@keyframes bloom{
to{opacity:1;transform:scale(1.2)}
}

/* Heart */
.heart{
position:absolute;
bottom:15%;
width:100%;
font-size:40px;
color:pink;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

/* Fireworks canvas */
canvas{
position:absolute;
top:0;
left:0;
}

</style>
</head>

<body>

<div class="galaxy"></div>

<div class="rose">
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
</div>

<div class="heart">
💖 Chúc Mừng 8-3 💖
<br>
Gửi Tặng: <span id="name">NGƯỜI BẠN YÊU</span>
</div>

<canvas id="fireworks"></canvas>

<script>

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function firework(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<60;i++){
particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*5,
vy:(Math.random()-0.5)*5,
life:100
})
}

}

setInterval(firework,1200);

function animate(){

ctx.fillStyle="rgba(0,0,0,0.2)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle="hsl("+Math.random()*360+",100%,60%)";
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0)particles.splice(i,1);

})

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
