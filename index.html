<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gửi Thảo 💖</title>

<style>

body{
margin:0;
overflow:hidden;
background:radial-gradient(circle,#120018,#000);
font-family:Arial;
color:white;
}

/* nền sao */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.png");
opacity:0.4;
animation:moveStars 120s linear infinite;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* chữ */

#message{
position:absolute;
top:40%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
text-align:center;
color:#ff6ec7;
font-weight:bold;
text-shadow:0 0 20px pink,0 0 40px pink;
z-index:10;
max-width:90%;
}

/* tim */

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

/* canvas pháo hoa */

canvas{
position:fixed;
top:0;
left:0;
}

</style>
</head>

<body>

<div class="stars"></div>

<div id="message"></div>

<canvas id="fireworks"></canvas>

<script>

/* ===== hiệu ứng gõ chữ ===== */

const text =
"Chúc mừng 8-3 Thảo 💖\n\n" +
"Chúc em luôn xinh đẹp và hạnh phúc nhé.";

let i=0;
const speed=70;
const message=document.getElementById("message");

function typing(){

if(i<text.length){

if(text.charAt(i)==="\n")
message.innerHTML+="<br>";
else
message.innerHTML+=text.charAt(i);

i++;

setTimeout(typing,speed);

}

}

typing();

/* ===== tim bay ===== */

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"%";
heart.style.top="100%";
heart.style.fontSize=(Math.random()*20+15)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},6000);

}

setInterval(createHeart,300);

/* ===== pháo hoa ===== */

const canvas=document.getElementById("fireworks");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function createFirework(){

let x=Math.random()*canvas.width;
let y=Math.random()*canvas.height/2;

for(let i=0;i<80;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100
});

}

}

setInterval(createFirework,1500);

function animate(){

ctx.fillStyle="rgba(0,0,0,0.15)";
ctx.fillRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{

p.x+=p.vx;
p.y+=p.vy;
p.life--;

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`;
ctx.fillRect(p.x,p.y,3,3);

if(p.life<=0){
particles.splice(i,1);
}

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
