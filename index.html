<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gửi Thảo 💖</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:radial-gradient(circle,#1a001f,#000);
color:white;
text-align:center;
}

/* galaxy background */

.stars{
position:fixed;
width:100%;
height:100%;
background:url("https://i.imgur.com/YKY28eT.png");
animation:moveStars 120s linear infinite;
opacity:0.4;
}

@keyframes moveStars{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* text */

#message{
position:absolute;
top:25%;
width:100%;
font-size:32px;
color:#ffb6d9;
text-shadow:0 0 15px pink;
font-weight:bold;
}

/* rose */

.rose{
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
}

.petal{
width:60px;
height:90px;
background:#ff2a6d;
border-radius:50%;
position:absolute;
opacity:0;
animation:bloom 4s forwards;
}

.petal:nth-child(1){transform:rotate(0deg) translateY(-40px);animation-delay:0s;}
.petal:nth-child(2){transform:rotate(45deg) translateY(-40px);animation-delay:0.4s;}
.petal:nth-child(3){transform:rotate(90deg) translateY(-40px);animation-delay:0.8s;}
.petal:nth-child(4){transform:rotate(135deg) translateY(-40px);animation-delay:1.2s;}
.petal:nth-child(5){transform:rotate(180deg) translateY(-40px);animation-delay:1.6s;}
.petal:nth-child(6){transform:rotate(225deg) translateY(-40px);animation-delay:2s;}
.petal:nth-child(7){transform:rotate(270deg) translateY(-40px);animation-delay:2.4s;}
.petal:nth-child(8){transform:rotate(315deg) translateY(-40px);animation-delay:2.8s;}

@keyframes bloom{
to{
opacity:1;
transform:scale(1.2);
}
}

/* hearts */

.heart{
position:absolute;
color:pink;
font-size:20px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(0);opacity:1;}
100%{transform:translateY(-800px);opacity:0;}
}

/* fireworks canvas */

canvas{
position:fixed;
top:0;
left:0;
}

</style>
</head>

<body>

<div class="stars"></div>

<div id="message"></div>

<div class="rose">
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
<div class="petal"></div>
</div>

<canvas id="fireworks"></canvas>

<script>

/* typing message */

let text="Chúc mừng 8-3 Thảo 💖 Em là điều tuyệt vời nhất trong cuộc đời anh."
let i=0

function typing(){
if(i < text.length){
document.getElementById("message").innerHTML += text.charAt(i)
i++
setTimeout(typing,80)
}
}

typing()

/* hearts */

function createHeart(){

let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"

heart.style.left=Math.random()*100+"%"
heart.style.top="100%"

heart.style.fontSize=Math.random()*25+15+"px"

document.body.appendChild(heart)

setTimeout(()=>{heart.remove()},6000)

}

setInterval(createHeart,300)

/* fireworks */

const canvas=document.getElementById("fireworks")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

function firework(){

let x=Math.random()*canvas.width
let y=Math.random()*canvas.height/2

for(let i=0;i<80;i++){

particles.push({
x:x,
y:y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
life:100
})

}

}

setInterval(firework,1500)

function animate(){

ctx.fillStyle="rgba(0,0,0,0.15)"
ctx.fillRect(0,0,canvas.width,canvas.height)

particles.forEach((p,i)=>{

p.x+=p.vx
p.y+=p.vy
p.life--

ctx.fillStyle=`hsl(${Math.random()*360},100%,60%)`
ctx.fillRect(p.x,p.y,3,3)

if(p.life<=0){
particles.splice(i,1)
}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
